<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TextSum — tóm tắt văn bản cục bộ hoặc qua OpenAI"
    />
    <title>TextSum — Tóm tắt văn bản</title>
    <!-- Apply saved theme before first paint to prevent flash -->
    <script>
      ;(function () {
        var t = localStorage.getItem('textsum_theme')
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
